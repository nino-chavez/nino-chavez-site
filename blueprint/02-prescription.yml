      - "Verify CF Web Analytics receiving"
      - "Document the build at tools/forge-site/applications/ninochavez-co.md as the reference portfolio-brand instantiation"
      - "Merge redesign/v3-context-engineer → main"
      - "Verify production deploy via curl + browser"

