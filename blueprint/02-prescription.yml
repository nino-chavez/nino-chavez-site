  - "All cut routes return 404 (or 301 to a sensible replacement)"
  - "Contact form sends email via Resend; Turnstile gate works"
  - "Cloudflare Pages serves; vercel.json absent; @vercel/* imports removed"
  - "Design brief conformance: signature appears on /, /work, /practice, /about, /contact (>= 5 pages)"
  - "Lighthouse perf >90, a11y >95"
  - "Reduced-motion verified — all entrance animations gated on prefers-reduced-motion: no-preference"

