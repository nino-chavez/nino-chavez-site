  - name: "Phase 0 — Sanitization & Deploys (parallel)"
    blocking_on: ["agent reports", "Nino review"]
    tasks:
      - "[done] Sanitize Atelier README — kill broken URL"
      - "[done] Sanitize Ask BC README — tech-led lede + placeholder URL replaced"
      - "[done] Sanitize bc-subscriptions README — methodology-led lede + 5 ADRs shortlisted"
      - "[in flight] Atelier deploy runbook — agent reporting back"
      - "[in flight] Ask BC custom domain runbook — agent reporting back"
      - "[deferred] DNS work — Nino runs in CF dashboard after seeing runbooks"

  - name: "Phase 1 — Foundation (this work product)"
    tasks:
      - "[done] Worktree at apps/website-nc-v3 on redesign/v3-context-engineer"
      - "[done] Stage 2 Diagnose — 01-diagnose.md"
      - "[done] Stage 3 Prescribe — 02-prescription.yml (this file)"
      - "[done] Stage 3.5 Design Brief — 03-design-brief.md"

  - name: "Phase 2 — Content rewrite"
    tasks:
      - "Rewrite /api/person.json payload — lead context-engineer, demote SAP Commerce"
      - "Rewrite /api/expertise.json payload — lead toolchain"
      - "Rewrite /api/experience.json payload — context-engineer narrative"
      - "Rewrite /about narrative"
      - "Rewrite hero claim + credibility ribbon"
      - "Re-rank + rewrite src/lib/work-data.ts entries — 5 lead studies, AEGIS as spine"
      - "Draft /practice page copy — toolchain + operating rules + instrumentation"
      - "Draft 5 case-study /work/[slug] pages from sanitized README quotes"

  - name: "Phase 3 — Build (Stage 4 Renovate)"
    tasks:
      - "Compile site-generation-prompt.md from brief"
      - "Run renovate against compiled prompt"
      - "Hand-draft schematic SVGs per brief §3 (5 diagrams)"
      - "Port surviving components (work case-study template, AEO endpoints, CF Images util)"
      - "Drop vercel.json, swap @vercel/analytics → CF Web Analytics, port /links + subdomain redirects to _redirects or worker"
      - "Implement contact form with Resend + Turnstile"
      - "Restore DESIGN.md conformance (violet accent, Inter, content-first)"

  - name: "Phase 4 — Prune (DESTRUCTIVE — needs explicit go)"
    blocked_on: "Nino sign-off per route"
    tasks:
      - "Delete src/routes/v1/"
      - "Delete src/routes/ai/learn/"
      - "Delete src/routes/ai/ask/, src/routes/api/ask/"
      - "Delete src/lib/components/cal/, src/routes/api/cal/, all Cal.com docs"
      - "Delete duplicate Header.svelte (resolve to single canonical)"
      - "Delete unused section components (HeroSection / FocusSection / FrameSection / ExposureSection / GallerySection / ConsultationSection)"
      - "Delete src/routes/links/ (consolidated into /contact)"
      - "Archive ~20 stale docs to docs/_archive/ or delete"

  - name: "Phase 5 — Handoff"
    tasks:
      - "Lighthouse audit (target: >90 perf, >95 a11y)"
