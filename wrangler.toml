name = "ninochavez-main"
compatibility_date = "2026-06-22"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Git-integrated Cloudflare Pages (project ninochavez-main). This file is what
# makes CF Pages validate/upload the SvelteKit adapter-cloudflare output
# (.svelte-kit/cloudflare) instead of the repo root. Without it, CF defaulted to
# the repo root and failed asset validation on dangling symlinks under _archive/
# and .cursorrules ("build output directory contains links that can't be
# accessed") — which is why main had not built since ~2026-05-28.
# Mirrors the rally-hq / nino-chavez-photography Pages config. Env vars
# (Anthropic, etc.) live in the Cloudflare Pages dashboard, not here.
