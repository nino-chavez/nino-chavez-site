version: 2.1.0
last_compiled: 2025-10-16 00:00:00
profile: default
multi_agent_mode: true
multi_agent_tool: claude-code
single_agent_mode: false

# Workflow Configuration
workflow:
  default_mode: direct      # Options: direct, selective, thorough
  auto_select: true         # Enable intelligent mode selection
  project_profile: medium   # Options: small, medium, large

# State Tracking Configuration
state_tracking:
  enabled: true
  auto_update: true
  max_decisions: 20
  max_resolved_blockers: 10
  max_session_logs: 10

# Context Management Configuration
context_management:
  enabled: true
  advisory_mode: true
  warn_after_task_groups: 3
  fresh_agent_for_modes:
    - thorough
