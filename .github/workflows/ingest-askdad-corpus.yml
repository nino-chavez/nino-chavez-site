# Event-triggered ask-dad corpus ingestion. Per ADR-0006.
#
# Triggers ONLY on push to main (content lands) and on workflow_dispatch
# (manual re-run from the Actions tab). Explicitly NOT a `schedule:` —
# scheduled background agents are refused per prior Nino direction; the
# artifact change is the event.
#
# Secrets are pulled from 1Password at runtime via the official
# 1password/load-secrets-action — matches the global convention recorded
# in ~/.claude/CLAUDE.md ("save sensitive data in 1Password as the
# standard convention going forward"). The ONLY GitHub Actions repo
# secret required is OP_SERVICE_ACCOUNT_TOKEN (1Password service account
# token with read access to the "Developer Secrets" vault).
#
# 1Password items referenced:
#   - Supabase ask-dad → service_role_key, url
#   - OpenAI labs      → credential
#
# Production-URL warning: the "Supabase ask-dad" item's `url` field
# currently resolves to http://127.0.0.1:54521 (local-dev). Before this
# workflow can succeed against the deployed corpus, that field needs to
# hold the cloud Supabase URL (https://<project>.supabase.co). Nino's
# call to update the 1Password item; the workflow will fail with a
# meaningful error until then.

name: ingest-askdad-corpus

on:
  push:
    branches: [main]
    paths:
      - 'blueprint/**'
      - 'src/lib/server/askdad/**'
      - 'tools/derive-corpus/**'
  workflow_dispatch:

concurrency:
  group: askdad-corpus
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OPENAI_API_KEY: op://Developer Secrets/OpenAI labs/credential
          SUPABASE_URL: op://Developer Secrets/Supabase ask-dad/url
          SUPABASE_SERVICE_KEY: op://Developer Secrets/Supabase ask-dad/service_role_key

      - name: Run derive-corpus
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: npx tsx tools/derive-corpus/derive-corpus.ts
